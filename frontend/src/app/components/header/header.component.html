<nav class="navbar" *ngIf="showHeader()">
  <div class="logo" routerLink="/" style="cursor: pointer;">Shop<span>Sphere</span></div>
  
  <div class="nav-links">
    <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Home</a>
    <a routerLink="/products" routerLinkActive="active">Catalog</a>
    <a *ngIf="isLoggedIn() && isAdmin()" routerLink="/categories" routerLinkActive="active">Categories</a>
    <a *ngIf="isLoggedIn()" [routerLink]="isAdmin() ? '/admin-dashboard' : '/user-dashboard'" routerLinkActive="active">Dashboard</a>
  </div>
  
  <div class="nav-actions">
    <!-- Logged Out Actions -->
    <ng-container *ngIf="!isLoggedIn()">
      <button class="btn-cart-nav" routerLink="/cart">
        🛒 Cart <span class="cart-badge" *ngIf="cartService.cartCount() > 0">{{ cartService.cartCount() }}</span>
      </button>
      <button class="btn-text" routerLink="/login">Sign In</button>
      <button class="btn-primary" routerLink="/register">Register</button>
    </ng-container>

    <!-- Logged In Actions -->
    <ng-container *ngIf="isLoggedIn()">
      <!-- User Cart (Admins don't see it) -->
      <button class="btn-cart-nav" routerLink="/cart" *ngIf="!isAdmin()">
        🛒 Cart <span class="cart-badge" *ngIf="cartService.cartCount() > 0">{{ cartService.cartCount() }}</span>
      </button>
      
      <!-- User Info Profile Trigger -->
      <div class="profile-container">
        <button class="user-profile-trigger" (click)="toggleProfilePopup($event)">
          <div class="user-avatar">👤</div>
          <div class="user-info-trigger">
            <span class="user-name">{{ isAdmin() ? 'Admin' : 'User' }}</span>
            <span class="dropdown-arrow" [class.rotated]="isProfilePopupOpen()">▼</span>
          </div>
        </button>

        <!-- Premium Profile Popup Dropdown -->
        <div class="profile-popup" *ngIf="isProfilePopupOpen()" (click)="$event.stopPropagation()">
          <div class="popup-header">
            <div class="popup-avatar">👤</div>
            <div class="popup-user-details">
              <span class="popup-user-name">{{ isAdmin() ? 'Administrator' : 'Valued Customer' }}</span>
              <span class="popup-user-email">{{ userEmail() }}</span>
            </div>
          </div>
          <div class="popup-divider"></div>
          <div class="popup-actions">
            <!-- Mobile-only backup nav links -->
            <div class="mobile-only-links" style="display: none; flex-direction: column; gap: 0.5rem; margin-bottom: 0.5rem;">
              <a routerLink="/" (click)="closeProfilePopup()" class="popup-link">
                🏠 Home
              </a>
              <a routerLink="/products" (click)="closeProfilePopup()" class="popup-link">
                📦 Catalog
              </a>
            </div>

            <!-- Admin quick-actions links -->
            <a *ngIf="isAdmin()" routerLink="/categories" (click)="closeProfilePopup()" class="popup-link">
              <span class="popup-icon">📁</span> Manage Categories
            </a>
            <a *ngIf="isAdmin()" routerLink="/products" (click)="closeProfilePopup()" class="popup-link">
              <span class="popup-icon">🛠️</span> Manage Inventory
            </a>
            <div class="popup-divider" *ngIf="isAdmin()"></div>

            <a [routerLink]="isAdmin() ? '/admin-dashboard' : '/user-dashboard'" [queryParams]="{ tab: 'settings' }" (click)="closeProfilePopup()" class="popup-link">
              <span class="popup-icon">⚙️</span> Profile Settings
            </a>
            <div class="popup-divider"></div>
            <button class="btn-popup-logout" (click)="logout()">
              <span class="popup-icon">🚪</span> Sign Out
            </button>
          </div>
        </div>
      </div>
    </ng-container>
  </div>
</nav>
