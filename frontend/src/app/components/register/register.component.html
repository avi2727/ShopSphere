<div class="auth-container">
  <div class="glow-bg">
    <div class="glow-circle c1"></div>
    <div class="glow-circle c2"></div>
  </div>

  <div class="auth-card-wrapper">
    <div class="auth-card">
      <div class="auth-header">
        <h2>Create <span>Account</span></h2>
        <p>Start your 14-day free trial. No credit card required.</p>
      </div>

      <form (ngSubmit)="onRegister()" #registerForm="ngForm" class="auth-form">
        <!-- Error banner -->
        <div class="error-banner" *ngIf="errorMessage()">
          <span class="error-icon">⚠️</span>
          <span class="error-text">{{ errorMessage() }}</span>
        </div>

        <!-- Success banner -->
        <div class="success-banner" *ngIf="successMessage()">
          <span class="success-icon">✓</span>
          <span class="success-text">{{ successMessage() }}</span>
        </div>

        <div class="form-group">
          <label for="name">Full Name</label>
          <div class="input-wrapper">
            <span class="input-icon">👤</span>
            <input
              type="text"
              id="name"
              name="name"
              [(ngModel)]="name"
              placeholder="Aviansh Shukla"
              required
            />
          </div>
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <div class="input-wrapper">
            <span class="input-icon">✉️</span>
            <input
              type="email"
              id="email"
              name="email"
              [(ngModel)]="email"
              placeholder="alex@example.com"
              required
            />
          </div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrapper">
            <span class="input-icon">🔒</span>
            <input
              type="password"
              id="password"
              name="password"
              [(ngModel)]="password"
              placeholder="At least 8 characters"
              required
            />
          </div>
        </div>

        <div class="remember-row">
          <label class="checkbox-container">
            <input type="checkbox" name="agreeTerms" [(ngModel)]="agreeTerms" />
            <span class="checkmark"></span>
            I agree to the
            <a class="terms-link" (click)="$event.preventDefault(); $event.stopPropagation()"
              >Terms of Service</a
            >
            &
            <a class="terms-link" (click)="$event.preventDefault(); $event.stopPropagation()"
              >Privacy Policy</a
            >
          </label>
        </div>

        <button type="submit" class="btn-submit" [disabled]="isLoading()">
          <span *ngIf="!isLoading()">Register</span>
          <span *ngIf="isLoading()" class="spinner"></span>
        </button>
      </form>

      <div class="auth-footer">Already have an account? <a routerLink="/login">Sign in</a></div>
    </div>
  </div>
</div>
