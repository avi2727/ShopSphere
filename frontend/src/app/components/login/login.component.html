<div class="auth-container">
  <div class="glow-bg">
    <div class="glow-circle c1"></div>
    <div class="glow-circle c2"></div>
  </div>

  <div class="auth-card-wrapper">
    <div class="auth-card">
      <div class="auth-header">
        <h2>Welcome <span>Back</span></h2>
        <p>Sign in to your dashboard to manage your e-commerce operations.</p>
      </div>

      <form (submit)="onLogin(); $event.preventDefault()" class="auth-form">
        <!-- Error message banner -->
        <div class="error-banner" *ngIf="errorMessage">
          <span class="error-icon">⚠️</span>
          <span class="error-text">{{ errorMessage }}</span>
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <div class="input-wrapper">
            <span class="input-icon">✉️</span>
            <input 
              type="email" 
              id="email" 
              name="email" 
              [(ngModel)]="email" 
              placeholder="admin@shopsphere.com" 
              required 
            />
          </div>
        </div>

        <div class="form-group">
          <div class="label-row">
            <label for="password">Password</label>
            <a class="forgot-link" (click)="$event.preventDefault()">Forgot password?</a>
          </div>
          <div class="input-wrapper">
            <span class="input-icon">🔒</span>
            <input 
              type="password" 
              id="password" 
              name="password" 
              [(ngModel)]="password" 
              placeholder="••••••••" 
              required 
            />
          </div>
        </div>

        <div class="remember-row">
          <label class="checkbox-container">
            <input type="checkbox" checked />
            <span class="checkmark"></span>
            Keep me logged in
          </label>
        </div>

        <button type="submit" class="btn-submit" [disabled]="isLoading">
          <span *ngIf="!isLoading">Sign In</span>
          <span *ngIf="isLoading" class="spinner"></span>
        </button>

        <div class="social-login">
          <p class="social-title">Or continue with</p>
          <div class="social-btns">
            <button type="button" class="btn-social" title="Google" (click)="$event.preventDefault()">
              <span>Google</span>
            </button>
            <button type="button" class="btn-social" title="Apple" (click)="$event.preventDefault()">
              <span>Apple</span>
            </button>
          </div>
        </div>
      </form>

      <div class="auth-footer">
        Don't have an account? <a routerLink="/register">Create free account</a>
      </div>
    </div>
  </div>
</div>
